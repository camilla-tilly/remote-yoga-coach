    <g stroke-width="1.2">
      <path d="M0,-14 C3,-9 3,-4 0,0 C-3,-4 -3,-9 0,-14Z" fill="#5E4B3B" fill-opacity="0.18" transform="rotate(22.5)"/>
      <path d="M0,-14 C3,-9 3,-4 0,0 C-3,-4 -3,-9 0,-14Z" fill="#5E4B3B" fill-opacity="0.18" transform="rotate(67.5)"/>
      <path d="M0,-14 C3,-9 3,-4 0,0 C-3,-4 -3,-9 0,-14Z" fill="#5E4B3B" fill-opacity="0.18" transform="rotate(112.5)"/>
      <path d="M0,-14 C3,-9 3,-4 0,0 C-3,-4 -3,-9 0,-14Z" fill="#5E4B3B" fill-opacity="0.18" transform="rotate(157.5)"/>
      <path d="M0,-14 C3,-9 3,-4 0,0 C-3,-4 -3,-9 0,-14Z" fill="#5E4B3B" fill-opacity="0.18" transform="rotate(202.5)"/>
      <path d="M0,-14 C3,-9 3,-4 0,0 C-3,-4 -3,-9 0,-14Z" fill="#5E4B3B" fill-opacity="0.18" transform="rotate(247.5)"/>
      <path d="M0,-14 C3,-9 3,-4 0,0 C-3,-4 -3,-9 0,-14Z" fill="#5E4B3B" fill-opacity="0.18" transform="rotate(292.5)"/>
      <path d="M0,-14 C3,-9 3,-4 0,0 C-3,-4 -3,-9 0,-14Z" fill="#5E4B3B" fill-opacity="0.18" transform="rotate(337.5)"/>
    </g>
    <!-- Tiny inner ring -->
