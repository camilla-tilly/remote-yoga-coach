    <g stroke-width="1.4">
      <path d="M0,-21 C4,-15 4,-7 0,0 C-4,-7 -4,-15 0,-21Z" fill="#5E4B3B" fill-opacity="0.1"/>
      <path d="M0,-21 C4,-15 4,-7 0,0 C-4,-7 -4,-15 0,-21Z" fill="#5E4B3B" fill-opacity="0.1" transform="rotate(45)"/>
      <path d="M0,-21 C4,-15 4,-7 0,0 C-4,-7 -4,-15 0,-21Z" fill="#5E4B3B" fill-opacity="0.1" transform="rotate(90)"/>
      <path d="M0,-21 C4,-15 4,-7 0,0 C-4,-7 -4,-15 0,-21Z" fill="#5E4B3B" fill-opacity="0.1" transform="rotate(135)"/>
      <path d="M0,-21 C4,-15 4,-7 0,0 C-4,-7 -4,-15 0,-21Z" fill="#5E4B3B" fill-opacity="0.1" transform="rotate(180)"/>
